<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLITHER_BLADE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #4CAF50; font-size: 3rem; font-weight: bold; text-shadow: 0 0 15px #2e7d32; pointer-events: none; user-select: none; }
        #msg { position: absolute; top: 45%; width: 100%; text-align: center; color: #fff; font-size: 1.2rem; display: none; background: rgba(0,0,0,0.8); padding: 20px 0; }
    </style>
</head>
<body>

    <div id="ui">0</div>
    <div id="msg">SNAKE DEAD<br>TAP TO RESPAWN</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const cfg = {
            gravity: 0.4,
            jump: -7.5,
            speed: 4,
            gap: 220,
            pipeW: 60,
            spawnRate: 100,
            snakeColor: "#4CAF50",
            headColor: "#81C784"
        };

        const cvs = document.getElementById('gameCanvas');
        const ctx = cvs.getContext('2d');
        const scoreUI = document.getElementById('ui');
        const msgUI = document.getElementById('msg');

        let sword = { x: 80, y: 0, vy: 0, ang: 0, history: [] };
        let segments = 3; // Starting length
        let pipes = [];
        let score = 0;
        let dead = false;
        let frame = 0;

        function init() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
            sword.y = cvs.height / 2;
            run();
        }

        function run() {
            update();
            draw();
            requestAnimationFrame(run);
        }

        function update() {
            if (dead) return;

            // Physics
            sword.vy += cfg.gravity;
            sword.y += sword.vy;
            sword.ang = Math.atan2(sword.vy, 12);

            // Snake Path History (For tail segments)
            sword.history.unshift({x: sword.x, y: sword.y, ang: sword.ang});
            if (sword.history.length > 100) sword.history.pop();

            // Spawn Pipers
            if (frame % cfg.spawnRate === 0) {
                let top = Math.random() * (cvs.height - cfg.gap - 100) + 50;
                pipes.push({ x: cvs.width, t: top, b: top + cfg.gap, passed: false });
            }

            // Pipe Logic
            pipes.forEach(p => {
                p.x -= cfg.speed;
                // Collision with Head
                if (sword.x + 30 > p.x && sword.x < p.x + cfg.pipeW) {
                    if (sword.y < p.t || sword.y > p.b) die();
                }
                // Scoring & Growth
                if (!p.passed && p.x < sword.x) {
                    p.passed = true;
                    score++;
                    segments += 2; // SNAKE GROWS
                    scoreUI.innerText = score;
                }
            });

            if (pipes.length > 0 && pipes[0].x < -100) pipes.shift();
            if (sword.y > cvs.height || sword.y < 0) die();
            frame++;
        }

        function draw() {
            // Checkered Snake Background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            // Draw Tail Segments
            for (let i = 0; i < segments; i++) {
                let index = i * 5; 
                if (sword.history[index]) {
                    let pos = sword.history[index];
                    ctx.save();
                    ctx.translate(pos.x, pos.y);
                    ctx.rotate(pos.ang);
                    ctx.fillStyle = cfg.snakeColor;
                    ctx.globalAlpha = 1 - (i / (segments + 5));
                    // Segment looks like a blade piece
                    ctx.fillRect(-10, -4, 20, 8);
                    ctx.restore();
                }
            }
            ctx.globalAlpha = 1;

            // Draw Obstacles (Classic Snake Green Blocks)
            ctx.fillStyle = "#2e7d32";
            ctx.strokeStyle = "#4CAF50";
            ctx.lineWidth = 4;
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, cfg.pipeW, p.t);
                ctx.strokeRect(p.x, 0, cfg.pipeW, p.t);
                ctx.fillRect(p.x, p.b, cfg.pipeW, cvs.height);
                ctx.strokeRect(p.x, p.b, cfg.pipeW, cvs.height);
            });

            // Draw Head (Sword Hilt)
            ctx.save();
            ctx.translate(sword.x, sword.y);
            ctx.rotate(sword.ang);
            ctx.fillStyle = cfg.headColor;
            ctx.shadowBlur = 15;
            ctx.shadowColor = cfg.headColor;
            ctx.fillRect(0, -5, 40, 10); // Main Blade head
            ctx.fillStyle = "#fff";
            ctx.fillRect(5, -15, 5, 30); // Crossguard
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function die() {
            dead = true;
            msgUI.style.display = 'block';
        }

        function reset() {
            score = 0;
            segments = 3;
            pipes = [];
            sword.y = cvs.height / 2;
            sword.vy = 0;
            sword.history = [];
            frame = 0;
            dead = false;
            scoreUI.innerText = '0';
            msgUI.style.display = 'none';
        }

        function input(e) {
            if(e) e.preventDefault();
            if (dead) reset();
            else sword.vy = cfg.jump;
        }

        window.addEventListener('touchstart', input, {passive: false});
        window.addEventListener('mousedown', (e) => { if(e.button === 0) input(); });
        window.addEventListener('resize', () => {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
        });

        init();
    </script>
</body>
</html>
