<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHING_PRO_V3</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5vh; }
        #score { color: #fff; font-size: 5rem; text-shadow: 0 0 20px #0ff; line-height: 1; }
        #speed { color: #0ff; font-size: 1rem; letter-spacing: 3px; margin-top: 10px; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; display: none; z-index: 20; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #f0f; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score">0</div>
        <div id="speed">VELOCITY: 1.0x</div>
    </div>

    <div id="msg">
        <h1 style="color:#f0f; margin:0;">SHATTERED</h1>
        <p>TAP TO REBOOT SYSTEM</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // INTERNAL CONFIG (Equivalent to your JSON)
        const CFG = {
            physics: { gravity: 0.26, jump: -6.5, baseSpeed: 4.2, accel: 0.2 },
            visuals: { pipeW: 75, gap: 200, trailMax: 15 },
            themes: [
                { name: "CYBER", bg: "#050505", p: "#f0f", s: "#fff", g: "#0ff" },
                { name: "SNAKE", bg: "#0a1a0a", p: "#2e7d32", s: "#81C784", g: "#fff" },
                { name: "BLOOD", bg: "#1a0000", p: "#7f0000", s: "#ff4444", g: "#f00" },
                { name: "FROST", bg: "#001a2d", p: "#00d4ff", s: "#fff", g: "#fff" },
                { name: "GOLD",  bg: "#2a1f00", p: "#ffae00", s: "#fffb00", g: "#fff" }
            ]
        };

        const cvs = document.getElementById('gameCanvas');
        const ctx = cvs.getContext('2d');
        const scoreUI = document.getElementById('score');
        const speedUI = document.getElementById('speed');
        const msgUI = document.getElementById('msg');

        let themeIdx = 0;
        let sword = { x: 80, y: 0, vy: 0, ang: 0, trail: [] };
        let pipes = [];
        let score = 0;
        let dead = false;
        let frame = 0;
        let shake = 0;

        function init() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
            sword.y = cvs.height / 2;
            loop();
        }

        function reset() {
            themeIdx = (themeIdx + 1) % CFG.themes.length;
            score = 0;
            pipes = [];
            sword.y = cvs.height / 2;
            sword.vy = 0;
            sword.trail = [];
            frame = 0;
            dead = false;
            scoreUI.innerText = "0";
            msgUI.style.display = "none";
        }

        function die() {
            if (dead) return;
            dead = true;
            shake = 15;
            msgUI.style.display = "block";
        }

        function update() {
            if (dead) return;

            let curSpeed = CFG.physics.baseSpeed + (score * CFG.physics.accel);
            speedUI.innerText = `VELOCITY: ${(curSpeed/CFG.physics.baseSpeed).toFixed(1)}x`;

            // Sword Physics
            sword.vy += CFG.physics.gravity;
            sword.y += sword.vy;
            sword.ang = Math.atan2(sword.vy, 14);

            // Trail (Snake-like)
            sword.trail.push({x: sword.x, y: sword.y, a: sword.ang});
            if(sword.trail.length > CFG.visuals.trailMax) sword.trail.shift();

            // Pipes
            if (frame % 90 === 0) {
                let h = Math.random() * (cvs.height - CFG.visuals.gap - 150) + 75;
                pipes.push({ x: cvs.width, t: h, b: h + CFG.visuals.gap, passed: false });
            }

            pipes.forEach(p => {
                p.x -= curSpeed;
                // Collision
                if (sword.x + 40 > p.x && sword.x < p.x + CFG.visuals.pipeW) {
                    if (sword.y < p.t || sword.y > p.b) die();
                }
                // Score
                if (!p.passed && p.x < sword.x) {
                    p.passed = true;
                    score++;
                    scoreUI.innerText = score;
                    shake = 5;
                }
            });

            if (pipes.length > 0 && pipes[0].x < -100) pipes.shift();
            if (sword.y > cvs.height || sword.y < 0) die();
            if (shake > 0) shake *= 0.8;
            frame++;
        }

        function draw() {
            const t = CFG.themes[themeIdx];
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = t.bg;
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            if (shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

            // Trail
            sword.trail.forEach((pos, i) => {
                ctx.globalAlpha = i / sword.trail.length;
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(pos.a);
                ctx.fillStyle = t.g;
                ctx.fillRect(0, -2, 50, 4);
                ctx.restore();
            });
            ctx.globalAlpha = 1;

            // Pipes
            ctx.shadowBlur = 15; ctx.shadowColor = t.p;
            ctx.fillStyle = t.p;
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, CFG.visuals.pipeW, p.t);
                ctx.fillRect(p.x, p.b, CFG.visuals.pipeW, cvs.height);
            });

            // Sword
            ctx.save();
            ctx.translate(sword.x, sword.y);
            ctx.rotate(sword.ang);
            ctx.shadowBlur = 20; ctx.shadowColor = t.g;
            ctx.fillStyle = t.s;
            ctx.fillRect(0, -4, 60, 8); // Blade
            ctx.fillStyle = t.g;
            ctx.fillRect(10, -14, 6, 28); // Guard
            ctx.restore();
            
            ctx.shadowBlur = 0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function handleInput(e) {
            if(e) e.preventDefault();
            if (dead) reset();
            else sword.vy = CFG.physics.jump;
        }

        window.addEventListener('touchstart', handleInput, {passive: false});
        window.addEventListener('mousedown', (e) => { if(e.button === 0) handleInput(); });
        window.addEventListener('resize', () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; });

        init();
    </script>
</body>
</html>
