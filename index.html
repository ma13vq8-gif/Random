<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; 
              color: #00ffcc; font-family: monospace; font-size: 3rem; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">0</div>
    <canvas id="gameCanvas"></canvas>

    <script src="features.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('ui');
        let gameConfig = {};
        let sword = { x: 80, y: 0, vy: 0, angle: 0 };
        let score = 0;
        let isDead = false;
        let frame = 0;

        async function init() {
            const res = await fetch('config.json');
            gameConfig = await res.json();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            sword.y = canvas.height / 2;
            loop();
        }

        function loop() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!isDead) {
                // Physics
                sword.vy += gameConfig.settings.gravity;
                sword.y += sword.vy;
                sword.angle = Math.atan2(sword.vy, 12);

                // Pipe Logic from features.js
                if (frame % 90 === 0) PipeManager.spawn(canvas, gameConfig);
                isDead = PipeManager.update(canvas, gameConfig, sword, () => {
                    score++;
                    scoreEl.innerText = score;
                });
            } else {
                ctx.fillStyle = "white";
                ctx.fillText("CRITICAL FAILURE - TAP TO REBOOT", canvas.width/2 - 100, canvas.height/2);
            }

            PipeManager.draw(ctx, gameConfig, canvas);

            // Draw Sword
            ctx.save();
            ctx.translate(sword.x, sword.y);
            ctx.rotate(sword.angle);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00ffcc";
            ctx.fillStyle = "white";
            ctx.fillRect(0, -3, 60, 6);
            ctx.restore();

            frame++;
            requestAnimationFrame(loop);
        }

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isDead) {
                isDead = false; score = 0; scoreEl.innerText = 0;
                sword.y = canvas.height/2; sword.vy = 0;
                PipeManager.pipes = [];
            } else {
                sword.vy = gameConfig.settings.jump;
            }
        });

        init();
    </script>
</body>
</html>
