<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAPPY BLADE // JSON ACCEL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #fff; font-size: 3rem; font-weight: bold; text-shadow: 0 0 15px #0ff; pointer-events: none; }
        #speed-tag { position: absolute; top: 15%; width: 100%; text-align: center; color: #ff0055; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="ui">0</div>
    <div id="speed-tag">INITIALIZING...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        let cfg = {}; // Loaded from JSON
        const cvs = document.getElementById('gameCanvas');
        const ctx = cvs.getContext('2d');
        const scoreUI = document.getElementById('ui');
        const speedUI = document.getElementById('speed-tag');

        let sword = { x: 70, y: 0, vy: 0, ang: 0 };
        let pipes = [];
        let score = 0;
        let dead = false;
        let currentSpeed = 0;

        // FETCH JSON CONFIG
        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                const data = await response.json();
                cfg = data;
                currentSpeed = cfg.physics.baseSpeed;
                init();
            } catch (e) {
                console.error("JSON Load Failed. Ensure you are using a local server or GitHub Pages.");
                // Fallback config so it doesn't break
                cfg = { physics: { gravity: 0.25, jumpForce: -5.8, baseSpeed: 4.0, accelerationPerPoint: 0.2 }, dimensions: { pipeGap: 200, pipeWidth: 70, spawnDistance: 350 }};
                currentSpeed = cfg.physics.baseSpeed;
                init();
            }
        }

        function init() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
            sword.y = cvs.height / 2;
            run();
        }

        function update() {
            if (dead) return;

            // THE ACCELERATION LOGIC
            currentSpeed = cfg.physics.baseSpeed + (score * cfg.physics.accelerationPerPoint);
            speedUI.innerText = `VELOCITY: ${currentSpeed.toFixed(1)}`;

            sword.vy += cfg.physics.gravity;
            sword.y += sword.vy;
            sword.ang = Math.min(Math.PI/4, Math.max(-Math.PI/4, sword.vy * 0.1));

            // Spawning
            if (pipes.length === 0 || pipes[pipes.length - 1].x < cvs.width - cfg.dimensions.spawnDistance) {
                let range = cvs.height - cfg.dimensions.pipeGap - 120;
                let top = Math.random() * range + 60;
                pipes.push({ x: cvs.width, t: top, b: top + cfg.dimensions.pipeGap, passed: false });
            }

            pipes.forEach(p => {
                p.x -= currentSpeed;
                if (sword.x + 40 > p.x && sword.x < p.x + cfg.dimensions.pipeWidth) {
                    if (sword.y < p.t || sword.y > p.b) dead = true;
                }
                if (!p.passed && p.x < sword.x) {
                    p.passed = true;
                    score++;
                    scoreUI.innerText = score;
                }
            });

            if (pipes.length > 0 && pipes[0].x < -100) pipes.shift();
            if (sword.y > cvs.height || sword.y < 0) dead = true;
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // Draw Pipes
            ctx.fillStyle = '#ff0055';
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, cfg.dimensions.pipeWidth, p.t);
                ctx.fillRect(p.x, p.b, cfg.dimensions.pipeWidth, cvs.height);
            });

            // Draw Sword
            ctx.save();
            ctx.translate(sword.x, sword.y);
            ctx.rotate(sword.ang);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0ff';
            ctx.fillRect(0, -4, 55, 8); 
            ctx.restore();
        }

        function run() {
            update();
            draw();
            requestAnimationFrame(run);
        }

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (dead) location.reload();
            else sword.vy = cfg.physics.jumpForce;
        });

        loadConfig();
    </script>
</body>
</html>
