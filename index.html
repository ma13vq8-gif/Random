<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHING // ma13vq8-gif</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #0ff; font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 15px #0ff; pointer-events: none; user-select: none; }
        #msg { position: absolute; top: 45%; width: 100%; text-align: center; color: #f0f; font-size: 1.5rem; display: none; text-shadow: 0 0 10px #f0f; }
    </style>
</head>
<body>

    <div id="ui">0</div>
    <div id="msg">SYSTEM FAILURE<br>TAP TO REBOOT</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- GAME DATA ---
        const cfg = {
            gravity: 0.45,
            jump: -8.5,
            speed: 5,
            gap: 210,
            pipeW: 70,
            spawnRate: 80
        };

        const cvs = document.getElementById('gameCanvas');
        const ctx = cvs.getContext('2d');
        const scoreUI = document.getElementById('ui');
        const msgUI = document.getElementById('msg');

        let sword = { x: 70, y: 0, vy: 0, ang: 0 };
        let pipes = [];
        let score = 0;
        let dead = false;
        let frame = 0;

        function init() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
            sword.y = cvs.height / 2;
            run();
        }

        function run() {
            update();
            draw();
            requestAnimationFrame(run);
        }

        function update() {
            if (dead) return;

            // Physics
            sword.vy += cfg.gravity;
            sword.y += sword.vy;
            sword.ang = Math.atan2(sword.vy, 15);

            // Piper Spawning
            if (frame % cfg.spawnRate === 0) {
                let range = cvs.height - cfg.gap - 100;
                let top = Math.random() * range + 50;
                pipes.push({ x: cvs.width, t: top, b: top + cfg.gap, passed: false });
            }

            // Piper Logic
            pipes.forEach(p => {
                p.x -= cfg.speed;

                // Collision
                if (sword.x + 45 > p.x && sword.x < p.x + cfg.pipeW) {
                    if (sword.y < p.t || sword.y > p.b) die();
                }

                // Score
                if (!p.passed && p.x < sword.x) {
                    p.passed = true;
                    score++;
                    scoreUI.innerText = score;
                }
            });

            if (pipes.length > 0 && pipes[0].x < -100) pipes.shift();
            if (sword.y > cvs.height || sword.y < 0) die();
            frame++;
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // Draw Pipers
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f0f';
            ctx.fillStyle = '#f0f';
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, cfg.pipeW, p.t);
                ctx.fillRect(p.x, p.b, cfg.pipeW, cvs.height);
            });

            // Draw Sword
            ctx.save();
            ctx.translate(sword.x, sword.y);
            ctx.rotate(sword.ang);
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#0ff';
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, -4, 60, 8); // Blade
            ctx.fillStyle = '#0ff';
            ctx.fillRect(10, -15, 6, 30); // Guard
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function die() {
            dead = true;
            msgUI.style.display = 'block';
        }

        function reset() {
            score = 0;
            pipes = [];
            sword.y = cvs.height / 2;
            sword.vy = 0;
            frame = 0;
            dead = false;
            scoreUI.innerText = '0';
            msgUI.style.display = 'none';
        }

        function input(e) {
            if(e) e.preventDefault();
            if (dead) reset();
            else sword.vy = cfg.jump;
        }

        window.addEventListener('touchstart', input, {passive: false});
        window.addEventListener('mousedown', (e) => { if(e.button === 0) input(); });
        window.addEventListener('resize', () => {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
        });

        init();
    </script>
</body>
</html>
